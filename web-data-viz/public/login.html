<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Oswald:wght@200..700&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="css/styleIndex.css">
    <title>Projeto Looh for the light | cadastro</title>
</head>

<body>
    <div class="login">
        <div class="container">
            <div class="cartao card-login">
                <a href="index.html"><img src="img/seta.svg" class="seta"></a>
                <div class="logo">
                    <img src="img/png_vagalume.png" alt="simbolo vagalumes">
                </div>
                <h2>Olá de volta!</h2>
                <h3>Faça login para continuar</h3>
                <div id="div_mensagem" class="aviso"></div>
                <div class="formulario">
                    <div class="campo">
                        <span>E-mail:</span>
                        <input id="email_input" type="text" placeholder="Login">
                    </div>
                    <div class="campo">
                        <span>Senha:</span>
                        <input id="senha_input" type="password" placeholder="******">
                    </div>
                    <button class="botao" onclick="entrar()">Entrar</button>
                </div>
                <p class="mensagem">Não possui conta?<a href="cadastro.html">Cadastre-se</a></p>
                

                <!-- <div id="div_aguardar" class="loading-div">
                    <img src="./assets/circle-loading.gif" id="loading-gif">
                </div> -->
            </div>
        </div>
    </div>
</body>
<script>
    function entrar() {
        let email = email_input.value;
        let senha = senha_input.value;

        if (email.trim() == "" || senha.trim() == "") {
            div_mensagem.innerHTML = `Preencha todos os campos`;
            return;
        }

        fetch("/usuarios/autenticar",{
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify({
                emailServer:email,
                senhaServer:senha
            })
        }).then(function(resposta) {
            console.log("Estou no then do entrar")
            if (resposta.ok) {
                resposta.json().then(json => {
                    sessionStorage.EMAIL_USUARIO = json.email
                    sessionStorage.NOME_USUARIO = json.nome 
                    sessionStorage.ID_USUARIO = json.id
                    window.location = "./index.html"
                })
            }
        }).catch(function(resposta){
            console.log("ERRO: ",resposta)
        })  
    }
</script>
</html>
